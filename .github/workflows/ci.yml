name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Mostrar información del workflow
        run: |
          echo "GitHub Actions funcionando para frontend"
          ls -la
          find . -maxdepth 2 -type f | sort
