name: CI/CD Frontend

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: frontend-innovatech
  EKS_CLUSTER: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Validar secretos requeridos
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then echo "Falta AWS_ACCESS_KEY_ID"; exit 1; fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then echo "Falta AWS_SECRET_ACCESS_KEY"; exit 1; fi
          if [ -z "${{ secrets.AWS_SESSION_TOKEN }}" ]; then echo "Falta AWS_SESSION_TOKEN"; exit 1; fi
          if [ -z "${{ secrets.AWS_ACCOUNT_ID }}" ]; then echo "Falta AWS_ACCOUNT_ID"; exit 1; fi
          if [ -z "${{ secrets.EKS_CLUSTER_NAME }}" ]; then echo "Falta EKS_CLUSTER_NAME"; exit 1; fi
          echo "Usando account ID: ${{ secrets.AWS_ACCOUNT_ID }}"

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y Push imagen
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG

      - name: Conectar a EKS
        run: |
          aws eks update-kubeconfig \
            --name "${{ env.EKS_CLUSTER }}" \
            --region "${{ env.AWS_REGION }}"

      - name: Actualizar imagen en manifiesto
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s|image: .*frontend-innovatech:latest|image: $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG|g" k8s/frontend-deployment.yaml

      - name: Deploy a EKS
        run: kubectl apply -f k8s/

      - name: Health Check post-deploy
        run: |
          kubectl rollout status deployment/innovatech-frontend --timeout=120s
          kubectl get pods
          kubectl get services
